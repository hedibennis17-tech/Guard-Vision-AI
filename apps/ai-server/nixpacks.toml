[phases.setup]
nixPkgs = ["python311", "glib", "libGL", "tesseract", "zbar"]

[phases.install]
cmds = [
    "python3 -m pip install --upgrade pip",
    "python3 -m pip install --no-cache-dir -r requirements.txt",
    "python3 -m pip uninstall opencv-python opencv-contrib-python -y || true",
    "python3 -m pip install --no-cache-dir opencv-python-headless --force-reinstall"
]

[start]
cmd = "python3 -m uvicorn main:app --host 0.0.0.0 --port ${PORT}"
